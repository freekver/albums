<style>
/* Dropdown Button */
.dropbtn {
  background-color: #3498DB;
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  cursor: pointer;
  width: 100px;
}

/* Dropdown button on hover & focus */
.dropbtn:hover, .dropbtn:focus {
  background-color: #2980B9;
}

/* The container <div> - needed to position the dropdown content */
.dropdown {
  position: relative;
  display: inline-block;
}

/* Dropdown Content (Hidden by Default) */
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

/* Links inside the dropdown */
.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

/* Change color of dropdown links on hover */
.dropdown-content a:hover {background-color: #ddd}

/* Show the dropdown menu (use JS to add this class to the .dropdown-content container when the user clicks on the dropdown button) */
.show {display:block;}

</style>

<script>
function set_result_table() {
  // Declare variables
  var input, filter, table, tr, td, i, txtValue;
  input = document.getElementById("input_artist");
  filter = input.value.toUpperCase();
  table = document.getElementById("result_table");
  tr = table.getElementsByTagName("tr");

  // Loop through all table rows, and hide those who don't match the search query
  for (i = 1; i < tr.length; i++) {
    td = tr[i].getElementsByTagName("td")[0];
    if (td) {
      txtValue = td.textContent || td.innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = "";
      } else {
        tr[i].style.display = "none";
      }
    }
  }
}


function set_result_table_decade(year0) {
  // Declare variables
  var input, filter, table, tr, td, i, txtValue;
  input = document.getElementById("input_artist");
  filter = input.value.toUpperCase();
  table = document.getElementById("result_table");
  tr = table.getElementsByTagName("tr");

  // Loop through all table rows, and hide those who don't match the search query
  for (i = 1; i < tr.length; i++) {
    th = tr[i].getElementsByTagName("th")[0];
    td = tr[i].getElementsByTagName("td")[0];
    if (th && td) {
      txtValue = th.textContent || th.innerText;
      year = parseInt(txtValue);
      txtValue = td.textContent || td.innerText;
      if (((year0 == 0 && year < 1960) || (year >= year0 && year < year0 + 10)) && txtValue.toUpperCase().indexOf(filter) > -1)  {
        tr[i].style.display = "";
      } else {
        tr[i].style.display = "none";
      }
    }
  }
}


function set_result_table_all() {
  // Declare variables
  var input, filter, table, tr, td, i, txtValue;
  input = document.getElementById("input_artist");
  filter = input.value.toUpperCase();
  table = document.getElementById("result_table");
  tr = table.getElementsByTagName("tr");

  // Loop through all table rows, and hide those who don't match the search query
  for (i = 1; i < tr.length; i++) {
   td = tr[i].getElementsByTagName("td")[0];
   if (td) {
    txtValue = td.textContent || td.innerText;
    if (txtValue.toUpperCase().indexOf(filter) > -1)  {
         tr[i].style.display = "";
    } else {
         tr[i].style.display = "none";
    }
   }
  }
}

</script>




<script>
/* When the user clicks on the button,
toggle between hiding and showing the dropdown content */
function dropdown_function() {
  document.getElementById("myDropdown").classList.toggle("show");
}

// Close the dropdown menu if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
</script>
